version: '3.8'

services:
  # -------------------------------------------------------------
  # The Core Coding Platform API
  # -------------------------------------------------------------
  coding-api:
    build: .
    container_name: coding_platform_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # If running Judge0 locally on the same VM via compose, point cleanly to it:
      - JUDGE0_URL=http://judge0-server:2358 
      # Hooks natively into the Redis service below
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  # -------------------------------------------------------------
  # Redis (Used for API Edge Caching)
  # -------------------------------------------------------------
  redis:
    image: redis:7.0-alpine
    container_name: coding_platform_redis
    ports:
      - "6379:6379"
    restart: always

# Notice: You can transparently paste your Judge0 Services (Server, Worker, Postgres) 
# straight into this file beneath `redis` if you intend to run everything on the exact same VM!
