<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Q_AI Debug Portal</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 20px; max-width: 700px; margin: 0 auto; }
  h2 { color: #e8b84b; margin: 24px 0 8px; }
  input, textarea { width: 100%; background: #222; border: 1px solid #444; color: #eee; padding: 8px; font-family: monospace; font-size: 13px; box-sizing: border-box; margin-bottom: 8px; }
  button { background: #e8b84b; color: #000; border: none; padding: 10px 20px; font-family: monospace; font-weight: bold; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.sec { background: #2dd4bf; }
  button.red { background: #f43f5e; color: #fff; }
  #log { background: #0a0a0a; border: 1px solid #333; padding: 12px; min-height: 120px; max-height: 400px; overflow-y: auto; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
  .ok  { color: #34d399; }
  .err { color: #f43f5e; }
  .inf { color: #7a9ab0; }
  .warn{ color: #e8b84b; }
  hr { border-color: #333; margin: 24px 0; }
  label { font-size: 11px; color: #7a9ab0; display: block; margin-bottom: 4px; }
  #q-list { background: #0a0a0a; border: 1px solid #333; padding: 12px; font-size: 12px; display: none; }
  #q-list div { padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
  .q-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .mini-btn { padding: 6px 10px; font-size: 11px; margin-right: 0; margin-bottom: 0; }
  .mic-live { background: #f43f5e; color: #fff; }
  .stt-note { font-size: 11px; color: #7a9ab0; margin-bottom: 6px; }
</style>
</head>
<body>

<h1 style="color:#e8b84b;font-size:18px;">⚡ Q_AI Debug Portal</h1>

<!-- ── CONFIG ── -->
<h2>1. Config</h2>
<label>API URL (FastAPI backend — localhost)</label>
<input id="m2url" value="http://localhost:8001" readonly style="opacity:0.7;cursor:default;" />
<button id="btn-bypass" onclick="runBypass()" class="sec">Run Bypass Test</button>

<hr/>

<!-- ── STEP 1: UPLOAD RESUME ── -->
<h2>2. Upload Resume</h2>
<label>Resume file (PDF / DOCX)</label>
<input type="file" id="rfile" accept=".pdf,.docx,.doc" />
<button id="btn-upload" onclick="uploadResume()">POST /upload_resume</button>
<button id="btn-skip-resume" onclick="skipResumeParser()" class="sec">Skip Resume Parser</button>

<hr/>

<!-- ── STEP 2: GENERATE QUESTIONS ── -->
<h2>3. Generate Questions → Module 2</h2>
<label>Profile JSON (auto-filled after Step 2, or paste manually)</label>
<textarea id="profile-json" rows="5" placeholder='{"candidate_name":"...","skills":"..."}'></textarea>
<button id="btn-gen" onclick="generateQuestions()" disabled>POST /generate_questions</button>

<hr/>

<!-- ── STEP 3: ANSWER + EVALUATE ── -->
<h2>4. Answer &amp; Evaluate → Module 2</h2>
<div id="q-list"></div>
<button id="btn-eval" onclick="evaluateAnswers()" disabled class="sec">POST /evaluate_answers</button>

<hr/>

<!-- ── LOG ── -->
<h2>Log</h2>
<button onclick="document.getElementById('log').innerHTML=''" class="red" style="padding:4px 10px;font-size:11px;">Clear</button>
<div id="log"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let sessionId   = null;
let questions   = [];
let profileData = null;
let currentAudio = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let isProcessingAudio = false;
let liveTranInterval = null;
let activeAnswerIndex = null;
let initialText = '';

const API_BASE = 'http://localhost:8001';
const M2_GENERATE_PATH = '/questions/generate';
const M2_EVALUATE_PATH = '/evaluation/evaluate_answers';

// ── Helpers ──────────────────────────────────────────────────────────────────
function url(id)  { return document.getElementById(id).value.trim().replace(/\/+$/,''); }
function log(msg, cls='inf') {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString();
  el.innerHTML += `<span class="${cls}">[${ts}] ${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function renderQuestions() {
  const ql = document.getElementById('q-list');
  ql.style.display = 'block';
  ql.innerHTML = questions.map((q, i) => `
    <div>
      <label>[Q${q.id}] [${q.difficulty}] ${q.question}</label>
      <div class="q-actions">
        <button type="button" class="mini-btn" onclick="playQuestionTTS(${i})">Speak Question</button>
        <button type="button" class="mini-btn sec" id="mic-btn-${i}" onclick="toggleQuestionRecording(${i})">Record Answer</button>
      </div>
      <div class="stt-note" id="stt-note-${i}">Use the microphone to transcribe into this answer box.</div>
      <textarea id="ans-${i}" rows="2" placeholder="Your answer..."></textarea>
    </div>
  `).join('');
  document.getElementById('btn-eval').disabled = false;
}

async function playTTS(text) {
  const m2 = url('m2url');
  if (!m2) {
    log('❌ Module 2 URL is empty.', 'err');
    return;
  }

  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  try {
    const res = await fetch(`${m2}/stt/synthesize`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    if (!res.ok) {
      const textBody = await res.text();
      throw new Error(`HTTP ${res.status}: ${textBody}`);
    }

    const blob = await res.blob();
    const audioUrl = URL.createObjectURL(blob);
    currentAudio = new Audio(audioUrl);
    await currentAudio.play();
    log('✅ TTS playback started.', 'ok');
  } catch (e) {
    log(`❌ TTS error: ${e.message}`, 'err');
  }
}

function playQuestionTTS(index) {
  const q = questions[index];
  if (!q) return;
  playTTS(q.question);
}

function setMicButtonState(index, text, recording) {
  const btn = document.getElementById(`mic-btn-${index}`);
  const note = document.getElementById(`stt-note-${index}`);
  if (!btn || !note) return;
  btn.textContent = text;
  btn.classList.toggle('mic-live', recording);
  note.textContent = recording
    ? 'Recording in progress. Click again to stop and finalize transcription.'
    : 'Use the microphone to transcribe into this answer box.';
}

async function transcribeCurrentBuffer() {
  if (audioChunks.length === 0 || activeAnswerIndex === null) return;

  const m2 = url('m2url');
  if (!m2) {
    log('❌ Module 2 URL is empty.', 'err');
    return;
  }

  const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
  const formData = new FormData();
  formData.append('file', audioBlob, 'audio.webm');

  try {
    const response = await fetch(`${m2}/stt/transcribe`, {
      method: 'POST',
      body: formData
    });

    const data = await response.json();
    if (response.ok && data.status === 'success') {
      const answerBox = document.getElementById(`ans-${activeAnswerIndex}`);
      if (answerBox) {
        answerBox.value = initialText ? initialText + ' ' + data.text : data.text;
      }
    } else {
      throw new Error(data.detail || 'Unknown STT error');
    }
  } catch (e) {
    log(`❌ STT error: ${e.message}`, 'err');
  }
}

async function stopRecording() {
  const index = activeAnswerIndex;
  isRecording = false;
  if (liveTranInterval) clearInterval(liveTranInterval);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }

  if (index !== null) setMicButtonState(index, 'Finishing...', false);

  if (audioChunks.length > 0) {
    await transcribeCurrentBuffer();
  }

  if (index !== null) {
    setMicButtonState(index, 'Record Answer', false);
    log(`✅ STT captured for answer ${index + 1}.`, 'ok');
  }

  activeAnswerIndex = null;
}

async function toggleQuestionRecording(index) {
  if (isRecording) {
    if (activeAnswerIndex !== index) {
      log('⚠️ Another answer is currently recording. Stop it first.', 'warn');
      return;
    }
    await stopRecording();
    return;
  }

  if (isProcessingAudio) {
    log('⚠️ Previous recording is still being processed. Please wait a moment.', 'warn');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    audioChunks = [];
    activeAnswerIndex = index;
    const answerBox = document.getElementById(`ans-${index}`);
    initialText = answerBox ? answerBox.value.trim() : '';

    mediaRecorder.addEventListener('dataavailable', event => {
      if (event.data.size > 0) {
        audioChunks.push(event.data);
      }
    });

    mediaRecorder.addEventListener('stop', () => {
      stream.getTracks().forEach(track => track.stop());
      isProcessingAudio = false;
    });

    mediaRecorder.start(1000);
    isRecording = true;
    isProcessingAudio = true;
    setMicButtonState(index, 'Stop Recording', true);
    log(`🎤 Recording started for answer ${index + 1}.`, 'inf');

    liveTranInterval = setInterval(async () => {
      if (!isRecording || activeAnswerIndex !== index) return;
      await transcribeCurrentBuffer();
    }, 3500);
  } catch (e) {
    activeAnswerIndex = null;
    log(`❌ Mic error: ${e.message}`, 'err');
  }
}

// ── Fast-path: bypass M1 and use a mock profile ──────────────────────────────
async function runBypass() {
  const m2 = url('m2url');
  if (!m2) return log('❌ Module 2 URL is empty.', 'err');

  profileData = {
    candidate_name: "STT Tester",
    skills: "Python, Testing, Development",
    projects: "AI Portal Integration",
    experience: "3 Years"
  };
  document.getElementById('profile-json').value = JSON.stringify(profileData, null, 2);
  document.getElementById('btn-bypass').disabled = true;

  log('⚠️ Running bypass mode: skipping resume upload and using mock profile.', 'warn');
  log(`→ POST ${m2}${M2_GENERATE_PATH}`);

  try {
    const r = await fetch(`${m2}${M2_GENERATE_PATH}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(profileData),
    });

    const text = await r.text();
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${text}`);

    const data = JSON.parse(text);
    sessionId = data.session_id;
    questions = data.questions;
    const src = data.question_source === 'fallback_bank' ? '📦 Question Bank' : '🤖 LLM';

    log(`✅ ${questions.length} questions generated in bypass mode. Source: ${src} | Session: ${sessionId}`, 'ok');
    renderQuestions();

  } catch (e) {
    log(`❌ Bypass ${M2_GENERATE_PATH} error: ${e.message}`, 'err');
  } finally {
    document.getElementById('btn-bypass').disabled = false;
  }
}

async function skipResumeParser() {
  const m2 = url('m2url');
  if (!m2) return log('❌ Module 2 URL is empty.', 'err');

  profileData = {
    candidate_name: "Bypass Candidate",
    skills: "Python, FastAPI, Testing",
    projects: "Interview Portal Debugging",
    experience: "3 Years"
  };

  document.getElementById('profile-json').value = JSON.stringify(profileData, null, 2);
  document.getElementById('btn-skip-resume').disabled = true;

  log('⚠️ Skipping resume parsing and using a mock candidate profile.', 'warn');
  log(`→ POST ${m2}${M2_GENERATE_PATH}`);

  try {
    const r = await fetch(`${m2}${M2_GENERATE_PATH}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(profileData),
    });

    const text = await r.text();
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${text}`);

    const data = JSON.parse(text);
    sessionId = data.session_id;
    questions = data.questions;
    const src = data.question_source === 'fallback_bank' ? '📦 Question Bank' : '🤖 LLM';

    log(`✅ ${questions.length} interview questions generated from bypass profile. Source: ${src} | Session: ${sessionId}`, 'ok');
    renderQuestions();

  } catch (e) {
    log(`❌ Skip resume flow error: ${e.message}`, 'err');
  } finally {
    document.getElementById('btn-skip-resume').disabled = false;
  }
}

// ── Step 1: Upload Resume ─────────────────────────────────────────────────────
async function uploadResume() {
  const rfile = document.getElementById('rfile').files[0];
  if (!rfile) return log('❌ No resume file selected.', 'err');

  const m2 = url('m2url');
  if (!m2) return log('❌ API URL is empty.', 'err');

  log(`→ POST ${m2}/upload_resume`);
  document.getElementById('btn-upload').disabled = true;

  try {
    const form = new FormData();
    form.append("file", rfile);

    // Note: No Content-Type header for FormData — browser sets it with boundary
    const r = await fetch(`${m2}/upload_resume`, {
      method: 'POST',
      body: form,
    });

    const text = await r.text();
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${text}`);

    profileData = JSON.parse(text);
    log(`✅ Profile built. Name: ${profileData.candidate_name || '(unnamed)'}`, 'ok');
    log(`   Skills: ${(profileData.skills||'').slice(0,80)}...`, 'inf');

    // Auto-fill profile JSON textarea
    document.getElementById('profile-json').value = JSON.stringify(profileData, null, 2);
    document.getElementById('btn-gen').disabled = false;

  } catch(e) {
    log(`❌ Resume upload error: ${e.message}`, 'err');
  } finally {
    document.getElementById('btn-upload').disabled = false;
  }
}

// ── Step 2: Generate Questions ────────────────────────────────────────────────
async function generateQuestions() {
  const m2 = url('m2url');
  if (!m2) return log('❌ Module 2 URL is empty.', 'err');

  let profile;
  try {
    profile = JSON.parse(document.getElementById('profile-json').value);
  } catch(e) {
    return log('❌ Profile JSON is invalid. Fix it and retry.', 'err');
  }

  log(`→ POST ${m2}${M2_GENERATE_PATH}`);
  document.getElementById('btn-gen').disabled = true;

  try {
    const r = await fetch(`${m2}${M2_GENERATE_PATH}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(profile),
    });

    const text = await r.text();
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${text}`);

    const data = JSON.parse(text);
    sessionId = data.session_id;
    questions = data.questions;
    const src = data.question_source === 'fallback_bank' ? '📦 Question Bank' : '🤖 LLM';

    log(`✅ ${questions.length} questions generated. Source: ${src} | Session: ${sessionId}`, 'ok');

    renderQuestions();

  } catch(e) {
    log(`❌ Module 2 ${M2_GENERATE_PATH} error: ${e.message}`, 'err');
  } finally {
    document.getElementById('btn-gen').disabled = false;
  }
}

// ── Step 3: Evaluate Answers ──────────────────────────────────────────────────
async function evaluateAnswers() {
  const m2 = url('m2url');
  if (!m2)        return log('❌ Module 2 URL is empty.', 'err');
  if (!sessionId) return log('❌ No session. Generate questions first.', 'err');

  const answers = questions.map((q, i) => ({
    question_id:      q.id,
    candidate_answer: document.getElementById(`ans-${i}`).value.trim() || '(no answer)',
  }));

  const payload = { session_id: sessionId, answers };
  log(`→ POST ${m2}${M2_EVALUATE_PATH}`);
  document.getElementById('btn-eval').disabled = true;

  try {
    const r = await fetch(`${m2}${M2_EVALUATE_PATH}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    const text = await r.text();
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${text}`);

    const data = JSON.parse(text);
    log(`✅ Evaluation done!`, 'ok');
    log(`   Grade: ${data.grade}  |  Score: ${data.total_score}/${data.max_score}  |  ${data.percentage}%`, 'ok');
    log(`   Summary: ${data.summary}`, 'inf');
    data.results.forEach(res => {
      const icon = res.score >= 7 ? '✅' : res.score >= 4 ? '⚠️' : '❌';
      log(`   ${icon} Q${res.question_id} [${res.difficulty}] Score:${res.score}/10 — ${res.feedback}`, 'inf');
    });

  } catch(e) {
    log(`❌ Module 2 ${M2_EVALUATE_PATH} error: ${e.message}`, 'err');
  } finally {
    document.getElementById('btn-eval').disabled = false;
  }
}
</script>
</body>
</html>
