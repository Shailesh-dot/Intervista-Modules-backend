version: '3.8'

services:
  frontend:
    build:
      context: .m
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
      - "4040:4040"
    env_file:
      - ./files/.env
    restart: unless-stopped
